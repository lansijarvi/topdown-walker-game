// Traffic lights: a synchronized city-wide cycle - all east-west traffic
// gets a green together, then all north-south traffic, like timed lights
// along a real grid. One pole sits at each corner of every intersection,
// and (matching real intersections) the pole that matters for a given
// direction of travel is the one across the intersection on your right:
// eastbound reads the SE pole, westbound reads NW, southbound reads SW,
// northbound reads NE.
const LIGHT_GREEN_MS = 8000;
const LIGHT_YELLOW_MS = 2000;
const LIGHT_CYCLE_MS = (LIGHT_GREEN_MS + LIGHT_YELLOW_MS) * 2;

function getLightPhase(timestamp) {
  const t = timestamp % LIGHT_CYCLE_MS;
  if (t < LIGHT_GREEN_MS) return { h: 'green', v: 'red' };
  if (t < LIGHT_GREEN_MS + LIGHT_YELLOW_MS) return { h: 'yellow', v: 'red' };
  if (t < LIGHT_GREEN_MS + LIGHT_YELLOW_MS + LIGHT_GREEN_MS) return { h: 'red', v: 'green' };
  return { h: 'red', v: 'yellow' };
}

const TRAFFIC_LIGHTS = [];
NUMBERED_STREETS.forEach(hs => {
  NAMED_STREETS.forEach(vs => {
    TRAFFIC_LIGHTS.push({ x: vs.x + ROAD_W + 9, y: hs.y - 9, axis: 'v' });            // NE - northbound
    TRAFFIC_LIGHTS.push({ x: vs.x - 9, y: hs.y - 9, axis: 'h' });                      // NW - westbound
    TRAFFIC_LIGHTS.push({ x: vs.x + ROAD_W + 9, y: hs.y + ROAD_W + 9, axis: 'h' });    // SE - eastbound
    TRAFFIC_LIGHTS.push({ x: vs.x - 9, y: hs.y + ROAD_W + 9, axis: 'v' });             // SW - southbound
  });
});

const LIGHT_STOP_MARGIN = 12;   // gap kept before the stop line
const LIGHT_STOP_ZONE = 40;     // how far out a car starts checking the light

// true if this car should be held at a red/yellow light rather than a
// green one - checked against every cross-street it could be approaching
function carShouldStopAtLight(car, timestamp) {
  const phase = getLightPhase(timestamp);
  if (car.axis === 'h') {
    if (phase.h === 'green') return false;
    return NAMED_STREETS.some(vs => {
      const nearEdge = car.dir > 0 ? vs.x - LIGHT_STOP_MARGIN : vs.x + ROAD_W + LIGHT_STOP_MARGIN;
      const approach = car.dir > 0 ? nearEdge - car.x : car.x - nearEdge;
      return approach >= -2 && approach < LIGHT_STOP_ZONE;
    });
  } else {
    if (phase.v === 'green') return false;
    return NUMBERED_STREETS.some(hs => {
      const nearEdge = car.dir > 0 ? hs.y - LIGHT_STOP_MARGIN : hs.y + ROAD_W + LIGHT_STOP_MARGIN;
      const approach = car.dir > 0 ? nearEdge - car.y : car.y - nearEdge;
      return approach >= -2 && approach < LIGHT_STOP_ZONE;
    });
  }
}

// small pole with the classic red/yellow/green stacked signal head - all
// three lenses are always visible, but only the active one is lit up
function drawTrafficLight(x, y, color, camX, camY) {
  const sx = x - camX, sy = y - camY;
  ctx.save();
  ctx.translate(sx, sy);

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 2, 4, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // pole
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(-1.5, -14, 3, 16);

  // housing box, tall enough for three stacked lenses
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-5, -34, 10, 22);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(-5, -34, 10, 22);

  const lenses = [
    { name: 'red', y: -29, on: '#e03a3a', off: '#4a1c1c' },
    { name: 'yellow', y: -23, on: '#ffd23a', off: '#4a3f1c' },
    { name: 'green', y: -17, on: '#3ae05a', off: '#1c4a28' }
  ];
  lenses.forEach(lens => {
    ctx.fillStyle = lens.name === color ? lens.on : lens.off;
    ctx.beginPath();
    ctx.arc(0, lens.y, 2.4, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();
}

function drawOutside() {
  let camX = player.x + player.w / 2 - canvas.width / 2;
  let camY = player.y + player.h / 2 - canvas.height / 2;
  camX = Math.max(0, Math.min(WORLD_W - canvas.width, camX));
  camY = Math.max(0, Math.min(WORLD_H - canvas.height, camY));

  ctx.fillStyle = '#4a7c3c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let gx = -((camX) % gridSize); gx < canvas.width; gx += gridSize) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke();
  }
  for (let gy = -((camY) % gridSize); gy < canvas.height; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
  }

  drawRoads(camX, camY);
  drawParkGround(camX, camY);

  const currentPhase = getLightPhase(performance.now());
  TRAFFIC_LIGHTS.forEach(light => {
    drawTrafficLight(light.x, light.y, currentPhase[light.axis], camX, camY);
  });

  const drawables = [
    ...buildings.map(b => ({ type: 'building', obj: b, sortY: b.y + b.h })),
    ...citizens.filter(c => c.state !== 'inside').map(c => ({ type: 'citizen', obj: c, sortY: c.y })),
    ...PARK_TREES.map(t => ({ type: 'tree', obj: t, sortY: PARK.y + t.y })),
    ...CITY_TREES.map(t => ({ type: 'citytree', obj: t, sortY: t.y })),
    ...parkWalkers.map(w => ({ type: 'parkwalker', obj: w, sortY: PARK.y + w.y })),
    ...(motorcycleParked ? [{ type: 'parkedmoto', obj: motorcycleParked, sortY: motorcycleParked.y }] : []),
    ...(!player.hasMotorcycle ? [{ type: 'parkedmoto', obj: MOTO_SHOWROOM_SPOT, sortY: MOTO_SHOWROOM_SPOT.y }] : []),
    ...(carParked ? [{ type: 'parkedcar', obj: carParked, sortY: carParked.y }] : []),
    ...(!player.hasCar ? [{ type: 'parkedcar', obj: CAR_SHOWROOM_SPOT, sortY: CAR_SHOWROOM_SPOT.y }] : []),
    ...trafficCars.map(car => ({ type: 'trafficcar', obj: car, sortY: car.y })),
    { type: 'player', sortY: player.y + player.h }
  ];
  drawables.sort((a, b) => a.sortY - b.sortY);

  drawables.forEach(d => {
    if (d.type === 'building') {
      drawBuildingExterior(d.obj, camX, camY);
    } else if (d.type === 'citizen') {
      const c = d.obj;
      const isDown = c.knockedDownUntil && performance.now() < c.knockedDownUntil;
      drawBloodSpot(c, camX, camY);
      drawDude(c.x - camX, c.y - camY, c.color, null, { facing: c.facing, gender: c.gender, hairColor: c.hairColor, hairstyle: c.hairstyle, skinTone: c.skinTone, skirt: c.skirt, skirtColor: c.skirtColor, knockedDown: isDown });
    } else if (d.type === 'tree') {
      drawTree(PARK.x + d.obj.x, PARK.y + d.obj.y, camX, camY);
    } else if (d.type === 'citytree') {
      const t = d.obj;
      if (t.pine) drawPineTree(t.x, t.y, camX, camY);
      else drawTree(t.x, t.y, camX, camY);
    } else if (d.type === 'parkwalker') {
      const w = d.obj;
      const isDown = w.knockedDownUntil && performance.now() < w.knockedDownUntil;
      drawBloodSpot(w, camX - PARK.x, camY - PARK.y);
      drawDude(PARK.x + w.x - camX, PARK.y + w.y - camY, w.color, null, { gender: w.gender, hairColor: w.hairColor, hairstyle: w.hairstyle, skinTone: w.skinTone, skirt: w.skirt, skirtColor: w.skirtColor, knockedDown: isDown });
    } else if (d.type === 'parkedmoto') {
      drawMotorcycle(d.obj.x - camX, d.obj.y - camY, d.obj.facing, d.obj.color);
    } else if (d.type === 'parkedcar') {
      drawCar(d.obj.x - camX, d.obj.y - camY, d.obj.facing, d.obj.color);
    } else if (d.type === 'trafficcar') {
      const car = d.obj;
      const facing = car.axis === 'h' ? (car.dir > 0 ? 'right' : 'left') : (car.dir > 0 ? 'down' : 'up');
      drawCar(car.x - camX, car.y - camY, facing, car.color, car.police);
    } else {
      const px = player.x + player.w / 2 - camX;
      const py = player.y + player.h - camY;
      if (player.onCar) {
        drawCar(px, py, player.facing, player.carColor);
      } else {
        if (player.onMotorcycle) drawMotorcycle(px, py, player.facing, player.motoColor);
        drawBloodSpot(player, camX, camY);
        drawDude(px, py, '#3a6fd8', null, { facing: player.facing, gender: player.gender, hairColor: player.hairColor, hairstyle: player.hairstyle, skinTone: player.skinTone, gunEquipped: player.gunEquipped, muzzleFlash: performance.now() < muzzleFlashUntil, riding: player.onMotorcycle, knockedDown: performance.now() < playerHitUntil });
      }
    }
  });

  bullets.forEach(b => {
    if (b.scene !== 'outside') return;
    ctx.save();
    ctx.translate(b.x - camX, b.y - camY);
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillStyle = '#fff3c4';
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  if (motorcycleParked && !player.onMotorcycle) {
    const mdist = Math.hypot(
      (player.x + player.w / 2) - motorcycleParked.x,
      (player.y + player.h / 2) - motorcycleParked.y
    );
    if (mdist < MOUNT_RADIUS) {
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      const hint = '[M] to ride';
      const hw = ctx.measureText(hint).width;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(canvas.width/2 - hw/2 - 8, canvas.height - 40, hw + 16, 24);
      ctx.fillStyle = '#fff';
      ctx.fillText(hint, canvas.width/2, canvas.height - 23);
    }
  }

  if (carParked && !player.onCar) {
    const cdist = Math.hypot(
      (player.x + player.w / 2) - carParked.x,
      (player.y + player.h / 2) - carParked.y
    );
    if (cdist < MOUNT_RADIUS) {
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      const hint = '[C] to drive';
      const hw = ctx.measureText(hint).width;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(canvas.width/2 - hw/2 - 8, canvas.height - 40, hw + 16, 24);
      ctx.fillStyle = '#fff';
      ctx.fillText(hint, canvas.width/2, canvas.height - 23);
    }
  }

  drawDialogueUI();
}

function drawInterior() {
  const camX = (ROOM_W - canvas.width) / 2;
  const camY = (ROOM_H - canvas.height) / 2;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const rx = -camX, ry = -camY;

  ctx.fillStyle = currentBuilding.floor;
  ctx.fillRect(rx, ry, ROOM_W, ROOM_H);

  ctx.strokeStyle = '#000';
  ctx.lineWidth = WALL_THICK;
  ctx.strokeRect(rx + WALL_THICK/2, ry + WALL_THICK/2, ROOM_W - WALL_THICK, ROOM_H - WALL_THICK);

  const exitZone = { x: ROOM_W/2 - 30, y: ROOM_H - WALL_THICK - 14, w: 60, h: 20 };
  ctx.fillStyle = '#2a1f18';
  ctx.fillRect(rx + exitZone.x, ry + ROOM_H - WALL_THICK, exitZone.w, WALL_THICK);

  if (currentBuilding.stage) {
    const s = currentBuilding.stage;
    // raised stage platform
    ctx.fillStyle = '#4a2f4a';
    ctx.fillRect(rx + s.x, ry + s.y, s.w, s.h);
    ctx.strokeStyle = '#ffd27f';
    ctx.lineWidth = 3;
    ctx.strokeRect(rx + s.x, ry + s.y, s.w, s.h);
    // string lights along the front edge
    ctx.fillStyle = '#ffe066';
    for (let lx = s.x + 6; lx < s.x + s.w - 6; lx += 14) {
      ctx.beginPath();
      ctx.arc(rx + lx, ry + s.y + s.h, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // pole, running floor to ceiling in the middle of the stage
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(rx + s.poleX, ry + s.poleY + 4, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d8d8d8';
    ctx.fillRect(rx + s.poleX - 3, ry + s.y - 10, 6, s.h + 10);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(rx + s.poleX - 1, ry + s.y - 10, 2, s.h + 10);
  }

  if (currentBuilding.bar) {
    const bBar = currentBuilding.bar;
    // wooden counter
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(rx + bBar.x, ry + bBar.y, bBar.w, bBar.h);
    ctx.strokeStyle = '#2a1a10';
    ctx.lineWidth = 3;
    ctx.strokeRect(rx + bBar.x, ry + bBar.y, bBar.w, bBar.h);

    if (bBar.orientation === 'vertical') {
      // top edge highlight along the customer-facing (left) side
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(rx + bBar.x, ry + bBar.y, 5, bBar.h);
      // shelf of bottles against the wall, to the right of the counter
      ctx.fillStyle = '#3a2a15';
      ctx.fillRect(rx + bBar.x + bBar.w, ry + bBar.y + 10, 10, bBar.h - 20);
      ctx.fillStyle = '#7fc2e0';
      for (let by = bBar.y + 20; by < bBar.y + bBar.h - 20; by += 18) {
        ctx.fillRect(rx + bBar.x + bBar.w + 1, ry + by, 9, 5);
      }
    } else {
      // top edge highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(rx + bBar.x, ry + bBar.y, bBar.w, 5);
      // shelf of bottles along the back wall
      ctx.fillStyle = '#3a2a15';
      ctx.fillRect(rx + bBar.x + 10, ry + bBar.y - 16, bBar.w - 20, 10);
      ctx.fillStyle = '#7fc2e0';
      for (let bx = bBar.x + 20; bx < bBar.x + bBar.w - 20; bx += 18) {
        ctx.fillRect(rx + bx, ry + bBar.y - 15, 5, 9);
      }
    }
  }

  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(currentBuilding.name, rx + ROOM_W/2, ry + 26);

  const drawables = [
    ...(currentBuilding.displayBikes || []).map(bk => ({ type: 'displaybike', obj: bk, sortY: bk.y })),
    ...currentBuilding.npcs.map(n => ({ type: 'npc', obj: n, sortY: n.y })),
    { type: 'player', sortY: player.y + player.h }
  ];
  drawables.sort((a, b) => a.sortY - b.sortY);

  drawables.forEach(d => {
    if (d.type === 'npc') {
      const isDown = d.obj.knockedDownUntil && performance.now() < d.obj.knockedDownUntil;
      drawBloodSpot(d.obj, -rx, -ry);
      drawDude(rx + d.obj.x, ry + d.obj.y, d.obj.color, d.obj.name, { gender: d.obj.gender, hairColor: d.obj.hairColor, hairstyle: d.obj.hairstyle, skinTone: d.obj.skinTone, kid: d.obj.isKid, big: d.obj.big, skirt: d.obj.skirt, skirtColor: d.obj.skirtColor, bikini: d.obj.bikini, bikiniColor: d.obj.bikiniColor, knockedDown: isDown });
    } else if (d.type === 'displaybike') {
      drawMotorcycle(rx + d.obj.x, ry + d.obj.y, d.obj.facing, d.obj.color);
    } else {
      drawDude(rx + player.x + player.w/2, ry + player.y + player.h, '#3a6fd8', null, { facing: player.facing, gender: player.gender, hairColor: player.hairColor, hairstyle: player.hairstyle, skinTone: player.skinTone, gunEquipped: player.gunEquipped, muzzleFlash: performance.now() < muzzleFlashUntil });
    }
  });

  bullets.forEach(b => {
    if (b.scene !== 'interior') return;
    ctx.save();
    ctx.translate(rx + b.x, ry + b.y);
    ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillStyle = '#fff3c4';
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  drawDialogueUI();
}

function drawDialogueUI() {
  if (nearbyNPC && !dialogueOpen) {
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    const hint = '[E] to talk';
    const hw = ctx.measureText(hint).width;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(canvas.width/2 - hw/2 - 8, canvas.height - 40, hw + 16, 24);
    ctx.fillStyle = '#fff';
    ctx.fillText(hint, canvas.width/2, canvas.height - 23);
  }

  if (dialogueOpen && nearbyNPC && dialogueTree) {
    const node = dialogueTree[dialogueNodeKey];
    const options = node.options ? (typeof node.options === 'function' ? node.options(player) : node.options) : null;
    const boxH = 90;

    ctx.fillStyle = 'rgba(10,10,10,0.9)';
    ctx.fillRect(20, canvas.height - boxH - 20, canvas.width - 40, boxH);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(20, canvas.height - boxH - 20, canvas.width - 40, boxH);

    const speaker = node.speaker === 'npc' ? nearbyNPC.name : 'You';
    ctx.textAlign = 'left';
    ctx.font = 'bold 15px monospace';
    ctx.fillStyle = node.speaker === 'npc' ? '#ffd27f' : '#7fd0ff';
    ctx.fillText(speaker + ':', 38, canvas.height - boxH + 4);

    ctx.font = '15px monospace';
    ctx.fillStyle = '#fff';
    const nodeText = typeof node.text === 'function' ? node.text(player) : node.text;
    ctx.fillText(nodeText, 38, canvas.height - boxH + 30);

    if (options) {
      ctx.font = '12px monospace';
      ctx.fillStyle = '#7fffb0';
      ctx.textAlign = 'right';
      ctx.fillText('Choose below, or press 1-9', canvas.width - 38, canvas.height - 30);
    } else {
      ctx.font = '12px monospace';
      ctx.fillStyle = '#aaa';
      ctx.textAlign = 'right';
      ctx.fillText(node.end ? '[E] to close' : '[E] to continue', canvas.width - 38, canvas.height - 30);
    }
  }
}

function drawHUD() {
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'right';
  const cashText = `$${player.money}`;
  const ctw = ctx.measureText(cashText).width;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(canvas.width - ctw - 34, 10, ctw + 24, 30);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(canvas.width - ctw - 34, 10, ctw + 24, 30);
  ctx.fillStyle = '#7fffb0';
  ctx.fillText(cashText, canvas.width - 22, 31);

  const saveRemaining = lastSaveFlashUntil - performance.now();
  if (saveRemaining > 0) {
    const alpha = Math.min(1, saveRemaining / 400);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    const saveText = 'Saved';
    const stw = ctx.measureText(saveText).width;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(canvas.width / 2 - stw / 2 - 8, 10, stw + 16, 20);
    ctx.fillStyle = '#7fffb0';
    ctx.fillText(saveText, canvas.width / 2, 24);
    ctx.restore();
  }

  if (player.hasGun) {
    const flashEmpty = performance.now() < lastShotBlockedFlashUntil;
    const ammoText = `${player.ammoInMag}/${MAG_SIZE}  •  ${player.spareMags} mag${player.spareMags === 1 ? '' : 's'}`;
    ctx.font = 'bold 14px monospace';
    const atw = ctx.measureText(ammoText).width;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(canvas.width - atw - 30, 46, atw + 20, 24);
    ctx.strokeStyle = flashEmpty ? '#ff6b6b' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(canvas.width - atw - 30, 46, atw + 20, 24);
    ctx.fillStyle = flashEmpty ? '#ff6b6b' : (player.ammoInMag === 0 ? '#ff9f7f' : '#ffd27f');
    ctx.fillText(ammoText, canvas.width - 20, 63);
  }

  if (dialogueOpen) return;

  const items = [];
  if (player.hasGun) {
    items.push({
      label: 'Glock',
      sub: player.gunEquipped ? `${player.ammoInMag}/${MAG_SIZE}` : 'Holstered',
      active: player.gunEquipped
    });
  }
  if (player.hasMotorcycle) {
    items.push({
      label: 'Motorcycle',
      sub: player.onMotorcycle ? 'Riding' : 'Parked',
      active: player.onMotorcycle
    });
  }
  if (player.hasCar) {
    items.push({
      label: 'Car',
      sub: player.onCar ? 'Driving' : 'Parked',
      active: player.onCar
    });
  }
  if (player.traits.tattoo && player.traits.tattoo !== 'none') {
    items.push({ label: player.traits.tattoo === 'skull' ? 'Skull Tat' : 'Flower Tat', sub: '', active: false });
  }
  if (items.length === 0) return;

  const slotW = 84, slotH = 46, gap = 8;
  let sx = 14;
  const sy = canvas.height - slotH - 14;
  items.forEach(item => {
    ctx.fillStyle = item.active ? 'rgba(255,210,127,0.25)' : 'rgba(0,0,0,0.55)';
    ctx.fillRect(sx, sy, slotW, slotH);
    ctx.strokeStyle = item.active ? '#ffd27f' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx, sy, slotW, slotH);

    ctx.textAlign = 'center';
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(item.label, sx + slotW / 2, sy + 20);
    if (item.sub) {
      ctx.font = '10px monospace';
      ctx.fillStyle = item.active ? '#ffd27f' : '#aaa';
      ctx.fillText(item.sub, sx + slotW / 2, sy + 36);
    }
    sx += slotW + gap;
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (scene === 'outside') drawOutside();
  else drawInterior();
  drawHUD();
}

function loop(timestamp) {
  timestamp = timestamp || 0;
  if (!lastFrameTime) lastFrameTime = timestamp;
  let dt = (timestamp - lastFrameTime) / (1000 / 60);
  dt = Math.max(0, Math.min(dt, 3));
  lastFrameTime = timestamp;

  update(timestamp, dt);
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('shootBtn').addEventListener('click', shoot);
document.getElementById('reloadBtn').addEventListener('click', reload);

// helper to bind a "held down" virtual key to a button, using both touch
// and mouse events so it also works for testing with a mouse on desktop
function bindHoldButton(id, keyName) {
  const el = document.getElementById(id);
  if (!el) return;
  const press = (e) => { e.preventDefault(); keys[keyName] = true; };
  const release = (e) => { e.preventDefault(); keys[keyName] = false; };
  el.addEventListener('touchstart', press, { passive: false });
  el.addEventListener('touchend', release, { passive: false });
  el.addEventListener('touchcancel', release, { passive: false });
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}

bindHoldButton('dpadUp', 'w');
bindHoldButton('dpadDown', 's');
bindHoldButton('dpadLeft', 'a');
bindHoldButton('dpadRight', 'd');

// RUN is a toggle instead of a hold button - trying to hold it down while
// also pressing a direction button is awkward with one thumb, so tap once
// to start running and tap again to stop
const runBtn = document.getElementById('dpadRun');
if (runBtn) {
  const toggleRun = (e) => {
    e.preventDefault();
    keys['shift'] = !keys['shift'];
    runBtn.classList.toggle('active', keys['shift']);
  };
  runBtn.addEventListener('touchstart', toggleRun, { passive: false });
  runBtn.addEventListener('click', toggleRun);
}

// one-shot action buttons - fire once per tap rather than being held
function bindTapButton(id, fn) {
  const el = document.getElementById(id);
  if (!el) return;
  const fire = (e) => { e.preventDefault(); fn(); };
  el.addEventListener('touchstart', fire, { passive: false });
  el.addEventListener('click', fire);
}

bindTapButton('talkBtn', pressInteract);
bindTapButton('gunBtn', toggleGunEquip);
bindTapButton('motoBtn', toggleMotorcycle);
bindTapButton('carBtn', toggleCar);

const SAVE_KEY = 'topdownWalkerSave';
let lastSaveFlashUntil = 0;

function saveGame() {
  const data = {
    player,
    scene,
    // index into `buildings`, not name - two buildings are both named "House"
    currentBuildingIndex: currentBuilding ? buildings.indexOf(currentBuilding) : -1,
    motorcycleParked,
    carParked
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  lastSaveFlashUntil = performance.now() + 1500;
}

document.getElementById('newGameBtn').addEventListener('click', () => {
  if (confirm('Start a new game? This erases your current save.')) {
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
});

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    Object.assign(player, data.player);
    scene = data.scene === 'interior' ? 'interior' : 'outside';
    currentBuilding = (data.currentBuildingIndex >= 0 && buildings[data.currentBuildingIndex]) ? buildings[data.currentBuildingIndex] : null;
    motorcycleParked = data.motorcycleParked || null;
    carParked = data.carParked || null;
  } catch (e) {
    console.error('Failed to load save', e);
  }
}

function updateNameDisplay() {
  document.getElementById('nameDisplay').textContent = player.name ? `Playing as: ${player.name}` : '';
}

function openNameOverlay(prefill) {
  awaitingName = true;
  const overlay = document.getElementById('nameOverlay');
  const input = document.getElementById('nameInput');
  overlay.classList.add('open');
  input.value = prefill || '';
  input.focus();
}

function submitName() {
  const input = document.getElementById('nameInput');
  player.name = input.value.trim().slice(0, 20) || 'Drifter';
  document.getElementById('nameOverlay').classList.remove('open');
  awaitingName = false;
  updateNameDisplay();
  saveGame();
}

document.getElementById('nameSubmitBtn').addEventListener('click', submitName);
document.getElementById('nameInput').addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') submitName();
});
document.getElementById('renameBtn').addEventListener('click', () => openNameOverlay(player.name));

loadGame();
if (!player.name) openNameOverlay('');
else updateNameDisplay();
setInterval(saveGame, 5000);
window.addEventListener('beforeunload', saveGame);

requestAnimationFrame(loop);
</script>
