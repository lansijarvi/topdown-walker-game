<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin:0; padding:0; background:#2b2b2b; overflow:hidden; height:100%; }
  canvas { display:block; margin:0 auto; background:#4a7c3c; image-rendering:pixelated; }
  #info { position:fixed; top:10px; left:10px; color:#eee; font-family:monospace; font-size:14px; background:rgba(0,0,0,0.5); padding:8px 12px; border-radius:6px; max-width:340px; }
</style>
</head>
<body>
<div id="info">WASD / Arrows move • Shift run • E talk<br>Get close to girls and get them horny 😈</div>
<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const WORLD_W = 3100;
const WORLD_H = 2200;

const player = { x: 400, y: 400, speed: 3, heat: 0 };

function drawDude(x, y, isFemale, label) {
  ctx.fillStyle = isFemale ? '#e83b7e' : '#4488ff';
  ctx.fillRect(x-11, y-35, 22, 50); // body

  if (isFemale) {
    ctx.fillStyle = '#f8b0a0';
    ctx.fillRect(x-13, y-32, 26, 16); // tits
    ctx.fillStyle = '#c2185b';
    ctx.fillRect(x-12, y-8, 24, 20); // short skirt
  }

  ctx.fillStyle = '#f0c090';
  ctx.beginPath(); ctx.arc(x, y-45, 11, 0, Math.PI*2); ctx.fill(); // head

  if (label) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, x, y-60);
  }
}

function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  ctx.fillStyle = '#4a7c3c';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // full town buildings
  ctx.fillStyle = '#8a5a5a';
  ctx.fillRect(100,100,200,150); // tattoo parlor
  ctx.fillRect(500,150,180,120); // bar
  ctx.fillRect(800,200,160,130); // strip club
  ctx.fillRect(1200,180,220,110); // grocery
  ctx.fillRect(1600,170,240,130); // restaurant
  
  drawDude(player.x, player.y, false, "You");
  drawDude(350, 280, true, "Ivy");
  drawDude(650, 320, true, "Bree");
  drawDude(950, 250, true, "Rita");
  drawDude(1250, 300, true, "Carla");
  
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
